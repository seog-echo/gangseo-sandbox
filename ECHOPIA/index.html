<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Echopia</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0e0c0b;
    font: 14px/1.4 system-ui, sans-serif; color: #e9e2d8; }
  body { display: flex; }

  /* game viewport (left) */
  #app { position: relative; flex: 1; min-width: 0; }
  canvas#scene { display: block; }

  /* top bar over the game */
  #topbar { position: absolute; top: 0; left: 0; right: 0; height: 46px; display: flex;
    align-items: center; gap: 14px; padding: 0 18px; pointer-events: none; z-index: 5;
    background: linear-gradient(#000000aa, #00000000); }
  #topbar h1 { font-size: 16px; margin: 0; color: #f4b860; letter-spacing: 2px; }
  .pill { background: #1f1a16cc; border: 1px solid #ffffff14; padding: 4px 10px;
    border-radius: 999px; font-size: 12px; white-space: nowrap; }
  .pill b { color: #f4d9a8; }

  #hint { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: #1f1a16cc; border: 1px solid #ffffff14; padding: 6px 14px;
    border-radius: 999px; font-size: 12px; color: #c9bca5; pointer-events: none; z-index: 5; }

  /* signal side panel (right) */
  #side { width: 372px; flex: none; height: 100%; overflow-y: auto;
    background: #14110f; border-left: 1px solid #00000080; padding: 12px; }
  #side h2 { font-size: 12px; margin: 4px 2px 8px; color: #f4b860; text-transform: uppercase; letter-spacing: 1px; }
  .modes { display: flex; gap: 6px; margin-bottom: 10px; }
  .modes button { flex: 1; background: #2a231d; color: #cdbfa8; border: 1px solid #ffffff10;
    border-radius: 6px; padding: 6px 0; cursor: pointer; font-size: 12px; }
  .modes button.active { background: #f4b860; color: #1b1612; font-weight: 600; }
  .plot { background: #1b1612; border: 1px solid #2a231d; border-radius: 8px; padding: 6px 8px; margin-bottom: 8px; }
  .plot .lbl { font-size: 11px; color: #b8a98f; margin-bottom: 2px; display: flex; justify-content: space-between; }
  .plot .lbl .unit { color: #6f6555; }
  .plot canvas { width: 100%; height: 84px; display: block; }
  .readout { background: #1b1612; border: 1px solid #2a231d; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
  .row { display: flex; align-items: center; gap: 8px; margin: 5px 0; font-size: 12px; }
  .row .tag { width: 64px; color: #b8a98f; }
  .bar { height: 10px; background: #2a231d; border-radius: 5px; overflow: hidden; flex: 1; }
  .bar > i { display: block; height: 100%; width: 0%; transition: width .12s linear; }
  .bar.amp > i { background: #f4b860; }
  .bar.beta > i { background: #e0795b; }

  /* interaction popup */
  #popup { position: fixed; z-index: 20; display: none; min-width: 150px;
    background: #1b1612f2; border: 1px solid #f4b86055; border-radius: 10px;
    padding: 8px; box-shadow: 0 8px 30px #000a; transform: translate(-50%, -120%); }
  #popup .title { font-size: 12px; color: #f4b860; padding: 2px 8px 6px; }
  #popup button { display: block; width: 100%; text-align: left; background: #2a231d;
    color: #e9e2d8; border: 1px solid #ffffff10; border-radius: 6px; padding: 7px 10px;
    margin: 4px 0 0; cursor: pointer; font-size: 13px; }
  #popup button:hover { background: #f4b860; color: #1b1612; }

  #loading { position: fixed; inset: 0; display: flex; align-items: center;
    justify-content: center; flex-direction: column; gap: 10px; background: #0e0c0b;
    color: #f4b860; z-index: 50; transition: opacity .5s; }
  #loading .sub { color: #8a7e6c; font-size: 12px; }
</style>
</head>
<body>
<div id="app">
  <canvas id="scene"></canvas>
  <div id="topbar">
    <h1>ECHOPIA</h1>
    <span class="pill">Mr. Echo: <b id="hState">—</b></span>
    <span class="pill">stim: <b id="hStim">OFF</b></span>
    <span class="pill">IPG <b id="hBatt">—</b></span>
    <span class="pill" id="hConn">connecting…</span>
    <span class="pill" id="hArm" style="pointer-events:auto;cursor:pointer" title="Optional myCobot arm">🦾 arm: <b id="hArmState">…</b></span>
    <span class="pill" id="music" style="pointer-events:auto;cursor:pointer">♪ music: off</span>
  </div>
  <div id="hint">right-click to walk &nbsp;•&nbsp; click a glowing object to interact &nbsp;•&nbsp; tap the 📱 above Mr. Echo</div>
</div>

<div id="side">
  <h2>NODES signals</h2>
  <div class="modes" id="modes">
    <button data-mode="raw" class="active">Raw</button>
    <button data-mode="psd">PSD</button>
    <button data-mode="spec">Spectrogram</button>
  </div>
  <div id="plots"></div>

  <h2>Stimulation</h2>
  <div class="readout">
    <div class="row"><span class="tag">applied L</span><span class="bar amp"><i id="ampL"></i></span><b id="ampLv">0.0</b></div>
    <div class="row"><span class="tag">applied R</span><span class="bar amp"><i id="ampR"></i></span><b id="ampRv">0.0</b></div>
    <div class="row"><span class="tag">mode</span><b id="stimMode">off</b></div>
  </div>

  <h2>STN beta biomarker</h2>
  <div class="readout">
    <div class="row"><span class="tag">depth L</span><span class="bar beta"><i id="betaL"></i></span></div>
    <div class="row"><span class="tag">depth R</span><span class="bar beta"><i id="betaR"></i></span></div>
  </div>
</div>

<div id="popup"><div class="title"></div></div>
<div id="loading"><div>ECHOPIA</div><div class="sub">waking up Mr. Echo…</div></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module" src="./game/main.js"></script>
</body>
</html>
